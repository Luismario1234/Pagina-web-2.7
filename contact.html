<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>

    <link rel="icon" type="image/jpeg" href="img/icono.jpeg">
    <link rel="stylesheet" href="contact.css">
</head>
<body>

    <div class="juristic-container">

        <!-- Contenido principal -->
        <div class="main-content">

            <div class="text-section">

                <h1 class="title-jurassic">
                    ¡Comunícate <br>
                    con <br>
                    nosotros!
                </h1>

                <div class="section-rule">
                    <div class="rule-diamond"></div>
                </div>

                <p class="subtitle-jurassic">
                    Estamos para atenderte
                </p>

            </div>

            <div class="image-section">
                <div class="image-wrapper">
                    <img src="img/Iguana.jpeg" alt="Imagen de contacto">
                    <div class="danger-stripe"></div>
                </div>
            </div>

        </div>

        <!-- Contacto y ubicación -->
        <div class="footer-assets">

            <!-- WhatsApp -->
            <div class="social-block">

                <h3>CONTÁCTANOS</h3>

                <div class="social-links" style="justify-content:center;">

                    <a href="https://wa.me/503XXXXXXXX"
                       target="_blank"
                       class="social-btn whatsapp">
                        WHATSAPP
                    </a>

                </div>

            </div>

            <!-- Ubicación -->
            <div class="location-block">

                <h3>NUESTRA UBICACIÓN</h3>

                <div class="map-wrapper">

                    <iframe
                        src="https://www.google.com/maps?q=13.695306,-89.224164&output=embed"
                        allowfullscreen
                        loading="lazy"
                        referrerpolicy="no-referrer-when-downgrade">
                    </iframe>

                </div>

                <div style="text-align:center; margin-top:20px;">

                    <a href="https://maps.app.goo.gl/WJBVwAHcPgjsbFPx9?g_st=aw"
                       target="_blank"
                       class="social-btn whatsapp">
                        📍 VER EN GOOGLE MAPS
                    </a>

                </div>

            </div>

        </div>

    </div>

</body>
</html>
