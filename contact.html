<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <title>Contacto.</title>
    
    <link rel="icon" type="img/jpeg" href="img/icono.jpeg">
    
    <link rel="stylesheet" href="contact.css">

<body>

    <div class="juristic-container">

        </div>

        <div class="footer-assets">
